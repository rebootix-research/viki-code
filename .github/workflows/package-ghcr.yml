name: viki-package-ghcr

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/package-ghcr.yml
      - .dockerignore
      - Dockerfile
      - pyproject.toml
      - README.md
      - viki/**

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read package version
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
          PY

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=VIKI Code
            org.opencontainers.image.description=Governed coding infrastructure for repo-executing AI agents with approvals, rollback, live validation, and CLI/API/IDE workflows.
            org.opencontainers.image.vendor=Rebootix Artificial Intelligence Research and Development
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/main/README.md

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
